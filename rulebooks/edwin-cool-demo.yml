---
- name: Edwin EDA Cool Demo
  hosts: localhost
  sources:
    - name: edwin_event_stream_source
      ansible.eda.generic:
        payload:
          - ping: startup
        startup_delay: 86400

  rules:
    - name: Auto-remediate High CPU
      condition: event.payload.alert.name == "High CPU" and event.payload.alert.severity == "CRITICAL"
      action:
        # In a real scenario, you would use run_job_template to connect to AAP Controller
        # run_job_template:
        #   name: "Restart Service Template"
        #   organization: "Default"
        #   job_args:
        #     extra_vars:
        #       target_host: "{{ event.payload.host }}"
        debug:
          msg: "CRITICAL ALERT: High CPU detected on {{ event.payload.host }}. Auto-remediation triggered!"

    - name: Handle Database Disconnects
      condition: event.payload.alert.name == "Database Down"
      action:
        debug:
          msg: "DATABASE DOWN: Alerting DBA team for {{ event.payload.host }} and running diagnostic checks..."

    - name: Catch-all for other Edwin events
      condition: event.meta is defined or event.meta is not defined
      action:
        debug:
          msg: "Received non-critical event from Edwin: {{ event.payload }}"